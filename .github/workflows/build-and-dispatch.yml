name: Build and dispatch

# Drop into an app repo's .github/workflows/ directory.
#
# On every push to main: builds a Docker image, pushes to GHCR with both
# :latest and :sha-<commit> tags, then fires a repository_dispatch event
# at the infrastructure repo to trigger a deploy.
#
# Also runs on:
#   - repository_dispatch "cv-updated" — fired by pjunak/cv when new CV PDFs
#     are published, so the site picks them up immediately.
#   - a weekly schedule — fallback so fresh CV PDFs land even if the
#     dispatch from pjunak/cv isn't configured.
# The build fetches cv-en.pdf / cv-cz.pdf from pjunak/cv's rolling "latest"
# release before the image is built; the committed copies in assets/ are a
# local-dev fallback only.
#
# Required configuration in the app repo (Settings → Secrets and variables → Actions):
#   Secret   INFRA_DISPATCH_TOKEN   fine-grained PAT for the infra repo
#   Variable INFRA_REPO             owner/infra-repo (e.g. pjunak/junak.eu)
#   Variable INFRA_SERVICE          stack directory name (e.g. tiamat)

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [cv-updated]
  schedule:
    - cron: '0 4 * * 1'   # Mondays 04:00 UTC — weekly CV refresh fallback

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch current CV PDFs from pjunak/cv
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 -o assets/cv-en.pdf https://github.com/pjunak/cv/releases/latest/download/cv-en.pdf
          curl -fsSL --retry 3 -o assets/cv-cz.pdf https://github.com/pjunak/cv/releases/latest/download/cv-cz.pdf
          ls -l assets/cv-en.pdf assets/cv-cz.pdf

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        env:
          REPO: ${{ github.repository }}
        run: echo "name=ghcr.io/${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch:
    name: Dispatch deploy to infra repo
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Verify dispatch config
        env:
          TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          REPO: ${{ vars.INFRA_REPO }}
          SERVICE: ${{ vars.INFRA_SERVICE }}
        run: |
          set -euo pipefail
          : "${TOKEN:?INFRA_DISPATCH_TOKEN secret is not set}"
          : "${REPO:?INFRA_REPO variable is not set (e.g. owner/infra-repo)}"
          : "${SERVICE:?INFRA_SERVICE variable is not set (e.g. tiamat)}"

      - name: Trigger infra deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: ${{ vars.INFRA_REPO }}
          event-type: deploy
          client-payload: |-
            {
              "service": "${{ vars.INFRA_SERVICE }}",
              "sha": "${{ github.sha }}"
            }
