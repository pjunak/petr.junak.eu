<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>404 — Page Not Found</title>
  <meta name="theme-color" content="#F8F7FC" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0E0E18" media="(prefers-color-scheme: dark)">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

  <style>
    /* 404-specific layout — keeps this page self-contained */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--purple), var(--purple-soft));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    .error-desc {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 420px;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    .error-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--purple);
      color: #fff;
      padding: 0.65rem 1.6rem;
      border-radius: var(--pill-radius);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }

    .error-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--purple-glow);
    }

    [data-theme="dark"] .error-home {
      background: var(--purple-soft);
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Page not found</h1>
    <p class="error-desc">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="/" class="error-home">
      <i class="fa-solid fa-arrow-left"></i>
      Back to homepage
    </a>
  </main>

  <!-- Sync theme with user preference (same logic as main site) -->
  <script>
    (() => {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</body>
</html>
