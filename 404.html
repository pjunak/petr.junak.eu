<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title data-i18n="err.meta_title">404 — Page Not Found</title>
  <meta name="theme-color" content="#F8F7FC" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0E0E18" media="(prefers-color-scheme: dark)">
  <meta name="robots" content="noindex">

  <!-- Early language + theme detection (prevents FOUC) -->
  <script>
    (function () {
      try {
        var supported = ['en', 'cs'];
        var saved = localStorage.getItem('lang');
        var lang;
        if (saved && supported.indexOf(saved) !== -1) {
          lang = saved;
        } else {
          var browser = (navigator.language || 'en').toLowerCase().split('-')[0];
          lang = (browser === 'cs' || browser === 'sk') ? 'cs' : 'en';
        }
        document.documentElement.lang = lang;

        var theme = localStorage.getItem('theme');
        if (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark';
        if (theme) document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* localStorage unavailable — fall back to HTML defaults */ }
    })();
  </script>

  <!-- Styles (fonts self-hosted via @font-face in style.css) -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- Favicon -->
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">

  <style>
    /* 404-specific layout — keeps this page self-contained */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--purple), var(--purple-soft));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    .error-desc {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 420px;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    .error-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--purple);
      color: #fff;
      padding: 0.65rem 1.6rem;
      border-radius: var(--pill-radius);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }

    .error-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--purple-glow);
    }

    [data-theme="dark"] .error-home {
      background: var(--purple-soft);
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title" data-i18n="err.title">Page not found</h1>
    <p class="error-desc" data-i18n="err.description">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="/" class="error-home">
      <svg class="icon" aria-hidden="true"><use href="/assets/icons.svg#arrow-left"/></svg>
      <span data-i18n="err.home">Back to homepage</span>
    </a>
  </main>

  <script src="/js/i18n.js" defer></script>
</body>
</html>
