  <!-- Early language + theme detection (prevents FOUC for Czech visitors) -->
  <script>
    (function () {
      try {
        var supported = ['en', 'cs'];
        var fromUrl = new URLSearchParams(location.search).get('lang');
        var saved = localStorage.getItem('lang');
        var lang;
        if (fromUrl && supported.indexOf(fromUrl) !== -1) {
          lang = fromUrl; // shared/crawled ?lang= links win for this visit
        } else if (saved && supported.indexOf(saved) !== -1) {
          lang = saved;
        } else {
          var browser = (navigator.language || 'en').toLowerCase().split('-')[0];
          lang = (browser === 'cs' || browser === 'sk') ? 'cs' : 'en';
        }
        document.documentElement.lang = lang;

        var theme = localStorage.getItem('theme');
        if (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark';
        if (theme) document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* localStorage unavailable — fall back to HTML defaults */ }
    })();
  </script>
