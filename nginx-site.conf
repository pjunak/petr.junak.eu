# Site config for petr.junak.eu — replaces the stock /etc/nginx/conf.d/default.conf
# in nginx:alpine (see Dockerfile). Adds gzip, cache headers, and the styled 404 page.

server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve the styled 404 page for missing paths (absolute asset paths in
  # 404.html keep it rendering correctly at any URL depth).
  error_page 404 /404.html;

  # --- Compression -----------------------------------------------------------
  # text/html is always compressed when gzip is on (listing it would warn).
  # nginx 1.27 mime.types serves .js as application/javascript; text/javascript
  # is listed too so a future nginx bump that switches the mapping keeps JS
  # compressed. Binary formats (webp, png, pdf, woff2) are already compressed
  # and deliberately excluded.
  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_comp_level 5;
  gzip_types
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml
    text/xml
    text/plain;

  # --- Caching ---------------------------------------------------------------
  # NOTE: add_header does NOT inherit into location blocks that declare their
  # own add_header — repeat shared headers (nosniff) in each such block.

  # Default (HTML pages, manifest.json, robots.txt, sitemap.xml): store but
  # revalidate on every request, so deploys show up immediately. ETag /
  # Last-Modified make revalidation a cheap 304.
  add_header Cache-Control "no-cache" always;
  add_header X-Content-Type-Options "nosniff" always;

  # Static assets: cache for a day. NOT immutable / 1-year — filenames aren't
  # content-hashed, so a long TTL would pin stale files after a deploy.
  location ~* ^/(assets|css|js)/ {
    add_header Cache-Control "public, max-age=86400" always;
    add_header X-Content-Type-Options "nosniff" always;
  }
}
